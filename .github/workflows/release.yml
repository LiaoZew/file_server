name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux onefile
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name file_server_web web_server.py
          mv dist/file_server_web dist/file_server_web-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/file_server_web-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows onefile
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name file_server_web web_server.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/file_server_web.exe

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist

      - name: Create and upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/file_server_web-linux
            dist/file_server_web.exe
          generate_release_notes: true
