name: build-windows-onefile

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build onefile exe
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name file_server_web web_server.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: file_server_web-windows-exe
          path: dist/file_server_web.exe
